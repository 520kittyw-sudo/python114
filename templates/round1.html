<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="card shadow-lg p-5" style="max-width: 600px;">
        <h2 class="mb-3 text-primary">回合 1/5：市場初探</h2>
        <p class="text-muted">選擇比特幣風險最高，債券最穩。</p>
        <form action="/game/1" method="POST">
            <div class="mb-4">
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="90" id="r1" required><label class="form-check-label" for="r1">比特幣 - 梭哈 (風險 90)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="50" id="r2"><label class="form-check-label" for="r2">基金 - 平衡 (風險 50)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="10" id="r3"><label class="form-check-label" for="r3">債券 - 避險 (風險 10)</label></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">下一步</button>
        </form>
    </div>
</body>
</html>
