<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>幾何人格：三回合賽局</title>
    <style>
        body { background: #0F172A; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 50px; }
        .stage { display: none; }
        .active { display: block; }
        .option-card { background: #1E293B; border: 2px solid #334155; padding: 25px; margin: 15px auto; width: 80%; max-width: 400px; cursor: pointer; transition: 0.3s; border-radius: 10px; }
        .option-card:hover { border-color: #00E5FF; background: #2D3748; }
    </style>
</head>
<body>

    <h1 id="round-title">第一回合：市場初探</h1>
    <p>請選擇你本回合的投資配置：</p>

    <form id="gameForm" action="/game" method="POST">
        <input type="hidden" id="round1" name="round1">
        <input type="hidden" id="round2" name="round2">
        <input type="hidden" id="round3" name="round3">
        <input type="hidden" name="player_name" value="玩家">

        <div id="stage1" class="stage active">
            <div class="option-card" onclick="nextStage(1, 90, 'stage2')">比特幣 - 梭哈 (90%)</div>
            <div class="option-card" onclick="nextStage(1, 50, 'stage2')">基金 - 平衡 (50%)</div>
            <div class="option-card" onclick="nextStage(1, 10, 'stage2')">債券 - 避險 (10%)</div>
        </div>

        <div id="stage2" class="stage">
            <div class="option-card" onclick="nextStage(2, 95, 'stage3')">高槓桿期貨 (95%)</div>
            <div class="option-card" onclick="nextStage(2, 40, 'stage3')">藍籌股 (40%)</div>
            <div class="option-card" onclick="nextStage(2, 5, 'stage3')">銀行定存 (5%)</div>
        </div>

        <div id="stage3" class="stage">
            <div class="option-card" onclick="nextStage(3, 100, 'submit')">全額投資 - 守成 (100%)</div>
            <div class="option-card" onclick="nextStage(3, 60, 'submit')">分批佈局 (60%)</div>
            <div class="option-card" onclick="nextStage(3, 0, 'submit')">完全套現 (0%)</div>
        </div>
    </form>

    <script>
        function nextStage(round, value, next) {
            document.getElementById('round' + round).value = value;
            if (next === 'submit') {
                document.getElementById('gameForm').submit();
            } else {
                document.getElementById('stage' + round).classList.remove('active');
                document.getElementById(next).classList.add('active');
                document.getElementById('round-title').innerText = 
                    (next === 'stage2') ? "第二回合：市場變動" : "第三回合：終局博弈";
            }
        }
    </script>
</body>
</html>
