<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="card shadow-lg p-5" style="max-width: 600px;">
        <h2 class="mb-3 text-primary">回合 5/5：終局決定</h2>
        <p class="text-muted">最終決策，考驗你對市場趨勢的把握。</p>

        <div class="alert alert-warning mt-2">
         <small>💡 即時市場分析：{{ market_info }}</small>
        </div>
        
        <form action="/game/5" method="POST">
            <div class="mb-4">
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="90" required id="r1"><label class="form-check-label" for="r1">重壓主力商品 (風險 90)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="50" id="r2"><label class="form-check-label" for="r2">資產配置平衡 (風險 50)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="10" id="r3"><label class="form-check-label" for="r3">保守型收割 (風險 10)</label></div>
            </div>
            <button type="submit" class="btn btn-success w-100">查看分析報告</button>
        </form>
    </div>
</body>
</html>
