<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="card shadow-lg p-5" style="max-width: 600px;">
        <h2 class="mb-3 text-primary">回合 3/5：中場博弈</h2>
        <p class="text-muted">全額投資風險高，分批佈局相對穩健。</p>
        <form action="/game/3" method="POST">
            <div class="mb-4">
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="100" required id="r1"><label class="form-check-label" for="r1">全額投資 (風險 100)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="60" id="r2"><label class="form-check-label" for="r2">分批佈局 (風險 60)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="0" id="r3"><label class="form-check-label" for="r3">完全套現 (風險 0)</label></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">下一步</button>
        </form>
    </div>
</body>
</html>
