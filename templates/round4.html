<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="card shadow-lg p-5" style="max-width: 600px;">
        <h2 class="mb-3 text-primary">回合 4/5：產業衝擊</h2>
        <p class="text-muted">新創機會多但風險極高，傳統製造業則發展平穩。</p>
        
        <div class="alert alert-warning mt-2">
          <small>💡 即時市場分析：{{ market_info }}</small>
        </div>

        <form action="/game/4" method="POST">
            <div class="mb-4">
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="85" required id="r1"><label class="form-check-label" for="r1">投入新創產業 (風險 85)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="50" id="r2"><label class="form-check-label" for="r2">觀望中型企業 (風險 50)</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="radio" name="risk_value" value="20" id="r3"><label class="form-check-label" for="r3">傳統製造業 (風險 20)</label></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">下一步</button>
        </form>
    </div>
</body>
</html>
