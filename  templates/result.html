<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>分析報告</title>
</head>
<body>
    <div class="container">
        <h2>幾何人格分析報告</h2>
        <p>親愛的 {{ name }} 好：</p>
        
        <div style="background: #eef; padding: 20px;">
            <p>你的決策特徵期望值：<strong>{{ mean }}</strong></p>
            <p>你的決策行為方差 ($\sigma^2$)：<strong>{{ var }}</strong></p>
            <p><strong>分析結論：{{ conclusion }}</strong></p>
        </div>
        
        <br>
        <a href="/game" class="btn">回首頁重新測驗</a>
    </div>
</body>
</html>
